# 规则
rules:
  - DOMAIN,fastly.jsdelivr.net,DIRECT
  - DOMAIN-SUFFIX,${directDomain},DIRECT
  # YouTube
  - RULE-SET,YouTube,YouTube
  # TikTok
  - RULE-SET,TikTok,TikTok
  # Netflix
  - RULE-SET,Netflix,Netflix
  # AI
  - RULE-SET,OpenAI,AI
  - RULE-SET,Claude,AI
  # Meta
  - RULE-SET,Facebook,Meta
  - RULE-SET,Instagram,Meta
  - RULE-SET,Whatsapp,Meta
  # Microsoft
  - RULE-SET,Bing,默认
  - RULE-SET,Copilot,默认
  - RULE-SET,Microsoft,DIRECT
  # Google
  - RULE-SET,Google,默认
  # Apple
  - RULE-SET,Apple,DIRECT
  - RULE-SET,Apple_Domain,DIRECT
  # Others
  - RULE-SET,China,DIRECT
  - RULE-SET,China_Domain,DIRECT
  - RULE-SET,Proxy,默认

  # Private
  - GEOIP,private,DIRECT,no-resolve
  # Others
  - GEOIP,CN,DIRECT
  - MATCH,默认
