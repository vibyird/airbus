mode: rule
log-level: info
mixed-port: 7890
ipv6: false
# DNS
dns:
  enable: true
  ipv6: false
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
# 代理供应商
proxy-providers:
  ${subscribeName}:
    type: http
    url: ${subscribeUrl}
    path: ./Proxies/${subscribeName}.yaml
    interval: 3600
    filter: '^(?!.*(?:(?i:Traffic)|(?i:Expire)|网址|流量|到期|重置))'
proxies:
  - name: 直连
    type: direct
    udp: true
# 代理组
default-group: &default-group
  type: select
  proxies:
    - 香港
    - 新加坡
    - 日本
    - 美国
    - 其它
service-group: &service-group
  type: select
  proxies:
    - 默认
    - 香港
    - 新加坡
    - 日本
    - 美国
    - 其它
region-group: &region-group
  type: select
  include-all: true
proxy-groups:
  - name: 默认
    icon: ${url}/IconSet/Proxy.png
    <<: *default-group
  # Service Groups
  - name: YouTube
    icon: ${url}/IconSet/YouTube.png
    <<: *service-group
  - name: TikTok
    icon: ${url}/IconSet/TikTok.png
    <<: *service-group
  - name: Netflix
    icon: ${url}/IconSet/Netflix.png
    <<: *service-group
  - name: AI
    icon: ${url}/IconSet/AI.png
    <<: *service-group
  - name: Meta
    icon: ${url}/IconSet/Meta.png
    <<: *service-group
  # Region Groups
  - name: 香港
    icon: ${url}/IconSet/Hong_Kong.png
    <<: *region-group
    filter: '港|🇭🇰|HK|(?i:Hong *Kong)'
  - name: 新加坡
    icon: ${url}/IconSet/Singapore.png
    <<: *region-group
    filter: '新加坡|🇸🇬|SG|(?i:Singapore)'
  - name: 日本
    icon: ${url}/IconSet/Japan.png
    <<: *region-group
    filter: '日|🇯🇵|JP|(?i:Japan)'
  - name: 美国
    icon: ${url}/IconSet/United_States.png
    <<: *region-group
    filter: '美|🇺🇲|US|(?i:United *States)'
  - name: 其它
    icon: ${url}/IconSet/Global.png
    <<: *region-group
    filter: '^(?!.*(?:直连|港|🇭🇰|HK|(?i:Hong *Kong)|新加坡|🇸🇬|SG|(?i:Singapore)|日|🇯🇵|JP|(?i:Japan)|美|🇺🇲|US|(?i:United *States)))'
# 规则供应商
rule-providers:
  Proxy:
    type: http
    behavior: classical
    interval: 86400
    url: https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script/rule/Clash/ProxyLite/ProxyLite_No_Resolve.yaml
    path: ./Rules/Proxy.yaml
